name: Generate gRPC Code

on:
  push:
    paths:
      - 'proto/**'

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Protos
        uses: actions/checkout@v4
        with:
          path: protos

      - name: Checkout Generated
        uses: actions/checkout@v4
        with:
          repository: netizenda/AP2_Generated
          path: generated
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Generate code
        run: |
          mkdir -p generated/proto/v1
          protoc --proto_path=protos/proto \
            --go_out=generated/proto/v1 \
            --go_opt=paths=source_relative \
            --go-grpc_out=generated/proto/v1 \
            --go-grpc_opt=paths=source_relative \
            protos/proto/service.proto

      - name: Commit & Push
        run: |
          cd generated
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: auto-generated gRPC code" || echo "No changes"
          git push
